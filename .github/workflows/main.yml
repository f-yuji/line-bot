name: LINE Bot Auto

on:
  schedule:
    - cron: '0 22 * * *'  # 日本時間7時
    - cron: '0 10 * * *'  # 日本時間19時
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: Python準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: ライブラリ入れる
        run: pip install requests

      - name: 実行
        run: python test_line.py