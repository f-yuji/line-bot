{% extends "web/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_label %}{{ title }}{% endblock %}
{% block content %}
<div class="page-head">
  <h1 class="page-title">{{ title }}</h1>
</div>
<div class="panel">

  </div>
</div>
{% endblock %}
